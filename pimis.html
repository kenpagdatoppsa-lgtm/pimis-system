<!DOCTYPE html>
<html>
<head>
<title>PIMIS v4 - Fixed</title>
<meta charset="UTF-8">

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<style>
body {font-family:Arial; background:#f4f6f9; margin:20px;}
.container{display:none;}
table{width:100%; border-collapse:collapse; background:white;}
th,td{border:1px solid #ccc; padding:8px;}
th{background:#007bff;color:white;}
.card{background:white;padding:15px;border-radius:8px;width:200px;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>PIMIS Login</h2>
<form id="loginForm">
<input id="username" placeholder="Username" required><br>
<input id="password" type="password" placeholder="Password" required><br>
<button>Login</button>
</form>
<p id="loginError" style="color:red;"></p>
</div>

<!-- MAIN -->
<div id="mainContent" style="display:none;">
<h1>PIMIS System</h1>

<button onclick="logout()">Logout</button>
<button onclick="exportExcel()">Export Excel</button>
<button onclick="exportPDF()">Export PDF</button>

<div>
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('inventory')">Inventory</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="container">
<h2>Dashboard</h2>
<div style="display:flex;gap:10px;">
<div class="card">Items: <span id="totalItems"></span></div>
<div class="card">Qty: <span id="totalQty"></span></div>
<div class="card">Value: <span id="totalValue"></span></div>
</div>
</div>

<!-- INVENTORY -->
<div id="inventory" class="container">
<h2>Inventory</h2>

<input id="search" placeholder="Search..." onkeyup="search()">

<form id="form">
<input id="property" placeholder="Property" required>
<input id="item" placeholder="Item" required>
<input id="qty" type="number" placeholder="Qty" required>
<input id="price" type="number" placeholder="Unit Price" required>
<button>Add</button>
</form>

<table id="table">
<thead>
<tr>
<th>Property</th><th>Item</th><th>Qty</th>
<th>Unit Price</th><th>Total</th><th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>

<script>

// ELEMENTS
const loginForm = document.getElementById("loginForm");
const loginDiv = document.getElementById("login");
const main = document.getElementById("mainContent");
const error = document.getElementById("loginError");

// LOGIN
const users=[{u:"Admin",p:"Admin123!"}];

loginForm.onsubmit = e=>{
e.preventDefault();
const u=username.value;
const p=password.value;

const found = users.find(x=>x.u===u && x.p===p);

if(found){
loginDiv.style.display="none";
main.style.display="block";
show('dashboard');
localStorage.setItem("login",true);
}else error.textContent="Wrong login";
};

if(localStorage.getItem("login")){
loginDiv.style.display="none";
main.style.display="block";
show('dashboard');
}

function logout(){localStorage.clear(); location.reload();}

// DATA
let data = JSON.parse(localStorage.getItem("data")) || [];

// FORMAT PESO
function peso(x){
return "₱ " + Number(x).toLocaleString('en-PH',{minimumFractionDigits:2});
}

// SHOW PAGE
function show(id){
document.querySelectorAll(".container").forEach(x=>x.style.display="none");
document.getElementById(id).style.display="block";
updateDashboard();
render();
}

// ADD ITEM
form.onsubmit = e=>{
e.preventDefault();

const obj={
property:property.value,
item:item.value,
qty:Number(qty.value),
price:Number(price.value)
};

data.push(obj);
save();
render();
form.reset();
};

// SAVE
function save(){
localStorage.setItem("data",JSON.stringify(data));
}

// RENDER
function render(){
let rows="";
data.forEach((d,i)=>{
rows+=`<tr>
<td>${d.property}</td>
<td>${d.item}</td>
<td>${d.qty}</td>
<td>${peso(d.price)}</td>
<td>${peso(d.qty*d.price)}</td>
<td><button onclick="del(${i})">Delete</button></td>
</tr>`;
});
table.querySelector("tbody").innerHTML=rows;
}

// DELETE
function del(i){
data.splice(i,1);
save();
render();
}

// SEARCH
function search(){
const s=document.getElementById("search").value.toLowerCase();
let rows="";
data.forEach((d,i)=>{
if(d.property.toLowerCase().includes(s)||d.item.toLowerCase().includes(s)){
rows+=`<tr>
<td>${d.property}</td>
<td>${d.item}</td>
<td>${d.qty}</td>
<td>${peso(d.price)}</td>
<td>${peso(d.qty*d.price)}</td>
<td><button onclick="del(${i})">Delete</button></td>
</tr>`;
}
});
table.querySelector("tbody").innerHTML=rows;
}

// DASHBOARD
function updateDashboard(){
let qty=0,val=0;
data.forEach(d=>{
qty+=d.qty;
val+=d.qty*d.price;
});
totalItems.textContent=data.length;
totalQty.textContent=qty;
totalValue.textContent=peso(val);
}

// EXCEL
function exportExcel(){
const ws = XLSX.utils.json_to_sheet(data.map(d=>({
Property:d.property,
Item:d.item,
Qty:d.qty,
UnitPrice:d.price,
Total:d.qty*d.price
})));

ws['!cols']=[{wch:20},{wch:20},{wch:10},{wch:15},{wch:15}];

const wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"Inventory");
XLSX.writeFile(wb,"PIMIS.xlsx");
}

// PDF
function exportPDF(){
const { jsPDF } = window.jspdf;
const doc=new jsPDF();

const rows=data.map(d=>[
d.property,
d.item,
d.qty,
peso(d.price),
peso(d.qty*d.price)
]);

doc.autoTable({
head:[["Property","Item","Qty","Unit Price","Total"]],
body:rows
});

doc.save("PIMIS.pdf");
}

// INIT
render();
updateDashboard();

</script>

</body>
</html>
