<!DOCTYPE html>
<html>
<head>
    <title>PIMIS - Property Inventory Management System</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial; background:#f4f6f9; margin:20px; }
        h1,h2 { text-align:center; }
        .container { background:white; padding:15px; border-radius:10px; margin-bottom:20px; }
        input, select, button { padding:8px; margin:5px; }
        table { width:100%; border-collapse:collapse; margin-top:10px; }
        th, td { border:1px solid #ddd; padding:8px; text-align:center; }
        th { background:#007bff; color:white; }
        .menu button { margin:5px; }
        #loginError { color:red; text-align:center; }
    </style>
</head>
<body>

<h1>Property Inventory Management Information System</h1>

<!-- LOGIN -->
<div id="login" class="container">
    <h2>Sign In</h2>
    <form id="loginForm">
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Sign In</button>
    </form>
    <p id="loginError"></p>
</div>

<!-- MAIN CONTENT -->
<div id="mainContent" style="display:none;">

<div class="menu">
    <button onclick="showSection('inventory')">Inventory</button>
    <button onclick="showSection('issuance')">ICS/PAR</button>
    <button onclick="showSection('transfer')">Transfer</button>
    <button onclick="showSection('repair')">Repair</button>
    <button onclick="showSection('disposal')">Disposal</button>
    <button onclick="showSection('reports')">Reports</button>
    <button onclick="logout()">Logout</button>
</div>

<!-- INVENTORY -->
<div id="inventory" class="container">
<h2>Inventory Management</h2>
<form id="inventoryForm">
    <input type="text" id="propertyNo" placeholder="Property No" required>
    <input type="text" id="itemName" placeholder="Item Name" required>
    <input type="number" id="qty" placeholder="Quantity" required>
    <input type="number" id="value" placeholder="Unit Value" required>
    <input type="text" id="officer" placeholder="Officer">
    <input type="text" id="itemLocation" placeholder="Location">
    <select id="condition">
        <option>Serviceable</option>
        <option>Unserviceable</option>
    </select>
    <button type="submit">Add Item</button>
</form>

<table>
<thead>
<tr>
<th>Property</th>
<th>Item</th>
<th>Qty</th>
<th>Value</th>
<th>Officer</th>
<th>Location</th>
<th>Condition</th>
<th>Action</th>
</tr>
</thead>
<tbody id="inventoryTable"></tbody>
</table>
</div>

<!-- ISSUANCE -->
<div id="issuance" class="container" style="display:none">
<h2>ICS / PAR Issuance</h2>
<form id="issuanceForm">
<input type="text" id="issueProperty" placeholder="Property No">
<input type="text" id="ics" placeholder="ICS No">
<input type="text" id="par" placeholder="PAR No">
<input type="text" id="issuedTo" placeholder="Issued To">
<button type="submit">Issue</button>
</form>
<table>
<thead>
<tr><th>Property</th><th>ICS</th><th>PAR</th><th>Issued To</th></tr>
</thead>
<tbody id="issuanceTable"></tbody>
</table>
</div>

<!-- TRANSFER -->
<div id="transfer" class="container" style="display:none">
<h2>Transfer Property</h2>
<form id="transferForm">
<input type="text" id="transferProperty" placeholder="Property No">
<input type="text" id="fromOffice" placeholder="From Office">
<input type="text" id="toOffice" placeholder="To Office">
<button type="submit">Transfer</button>
</form>
<table>
<thead>
<tr><th>Property</th><th>From</th><th>To</th></tr>
</thead>
<tbody id="transferTable"></tbody>
</table>
</div>

<!-- REPAIR -->
<div id="repair" class="container" style="display:none">
<h2>Repair & Maintenance</h2>
<form id="repairForm">
<input type="text" id="repairProperty" placeholder="Property No">
<input type="text" id="issue" placeholder="Problem">
<input type="number" id="cost" placeholder="Cost">
<button type="submit">Record Repair</button>
</form>
<table>
<thead>
<tr><th>Property</th><th>Issue</th><th>Cost</th></tr>
</thead>
<tbody id="repairTable"></tbody>
</table>
</div>

<!-- DISPOSAL -->
<div id="disposal" class="container" style="display:none">
<h2>Disposal</h2>
<form id="disposalForm">
<input type="text" id="disposeProperty" placeholder="Property No">
<input type="text" id="method" placeholder="Disposal Method">
<button type="submit">Dispose</button>
</form>
<table>
<thead>
<tr><th>Property</th><th>Method</th></tr>
</thead>
<tbody id="disposalTable"></tbody>
</table>
</div>

<!-- REPORTS -->
<div id="reports" class="container" style="display:none">
<h2>Reports</h2>
<button onclick="exportInventory()">Export Full Report</button>
</div>

</div> <!-- End Main Content -->

<script>
// LOGIN SYSTEM
const users = [
    {username: "Admin", password: "Admin123!"},
    {username: "Officer", password: "Officer123!"}
];

const loginForm = document.getElementById("loginForm");
const loginError = document.getElementById("loginError");
const loginDiv = document.getElementById("login");
const mainContent = document.getElementById("mainContent");

loginForm.addEventListener("submit", function(e){
    e.preventDefault();
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const user = users.find(u => u.username === username && u.password === password);
    if(user){
        loginDiv.style.display = "none";
        mainContent.style.display = "block";
        showSection('inventory');
        localStorage.setItem("loggedIn", "true"); // Keep user logged in
    } else {
        loginError.textContent = "Invalid username or password!";
    }
});

// Auto-login if already logged in
if(localStorage.getItem("loggedIn") === "true"){
    loginDiv.style.display = "none";
    mainContent.style.display = "block";
    showSection('inventory');
}

// LOGOUT
function logout(){
    localStorage.removeItem("loggedIn");
    location.reload();
}

// SECTION TOGGLE
function showSection(section){
    document.querySelectorAll('.container').forEach(div => div.style.display='none');
    document.getElementById(section).style.display='block';
}

// DATA STORAGE
let inventory = JSON.parse(localStorage.getItem('inventory')) || [];
let issuance = JSON.parse(localStorage.getItem('issuance')) || [];
let transfers = JSON.parse(localStorage.getItem('transfers')) || [];
let repairs = JSON.parse(localStorage.getItem('repairs')) || [];
let disposals = JSON.parse(localStorage.getItem('disposals')) || [];

// INVENTORY
function renderInventory(){
    let table="";
    inventory.forEach((i,index)=>{
        table+=`<tr>
        <td>${i.property}</td>
        <td>${i.item}</td>
        <td>${i.qty}</td>
        <td>${i.value}</td>
        <td>${i.officer}</td>
        <td>${i.location}</td>
        <td>${i.condition}</td>
        <td><button onclick="deleteItem(${index})">Delete</button></td>
        </tr>`;
    });
    inventoryTable.innerHTML=table;
}

function deleteItem(index){
    inventory.splice(index,1);
    localStorage.setItem("inventory",JSON.stringify(inventory));
    renderInventory();
}

inventoryForm.addEventListener("submit",function(e){
    e.preventDefault();
    let item={
        property: propertyNo.value,
        item: itemName.value,
        qty: qty.value,
        value: value.value,
        officer: officer.value,
        location: itemLocation.value,
        condition: condition.value
    };
    inventory.push(item);
    localStorage.setItem("inventory",JSON.stringify(inventory));
    renderInventory();
    this.reset();
});

// ISSUANCE
issuanceForm.addEventListener("submit",function(e){
    e.preventDefault();
    issuance.push({
        property: issueProperty.value,
        ics: ics.value,
        par: par.value,
        to: issuedTo.value
    });
    localStorage.setItem("issuance",JSON.stringify(issuance));
    renderIssuance();
    this.reset();
});

function renderIssuance(){
    let t="";
    issuance.forEach(i=>{
        t+=`<tr>
        <td>${i.property}</td>
        <td>${i.ics}</td>
        <td>${i.par}</td>
        <td>${i.to}</td>
        </tr>`;
    });
    issuanceTable.innerHTML=t;
}

// TRANSFER
transferForm.addEventListener("submit",function(e){
    e.preventDefault();
    transfers.push({
        property: transferProperty.value,
        from: fromOffice.value,
        to: toOffice.value
    });
    localStorage.setItem("transfers",JSON.stringify(transfers));
    renderTransfers();
    this.reset();
});

function renderTransfers(){
    let t="";
    transfers.forEach(i=>{
        t+=`<tr>
        <td>${i.property}</td>
        <td>${i.from}</td>
        <td>${i.to}</td>
        </tr>`;
    });
    transferTable.innerHTML=t;
}

// REPAIR
repairForm.addEventListener("submit",function(e){
    e.preventDefault();
    repairs.push({
        property: repairProperty.value,
        issue: issue.value,
        cost: cost.value
    });
    localStorage.setItem("repairs",JSON.stringify(repairs));
    renderRepairs();
    this.reset();
});

function renderRepairs(){
    let t="";
    repairs.forEach(i=>{
        t+=`<tr>
        <td>${i.property}</td>
        <td>${i.issue}</td>
        <td>${i.cost}</td>
        </tr>`;
    });
    repairTable.innerHTML=t;
}

// DISPOSAL
disposalForm.addEventListener("submit",function(e){
    e.preventDefault();
    disposals.push({
        property: disposeProperty.value,
        method: method.value
    });
    localStorage.setItem("disposals",JSON.stringify(disposals));
    renderDisposals();
    this.reset();
});

function renderDisposals(){
    let t="";
    disposals.forEach(i=>{
        t+=`<tr>
        <td>${i.property}</td>
        <td>${i.method}</td>
        </tr>`;
    });
    disposalTable.innerHTML=t;
}

// REPORT
function exportInventory(){
    let report = {
        inventory,
        issuance,
        transfers,
        repairs,
        disposals
    };
    let blob = new Blob([JSON.stringify(report,null,2)], {type:"application/json"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "PIMIS_REPORT.json";
    a.click();
}

// INITIAL RENDER
renderInventory();
renderIssuance();
renderTransfers();
renderRepairs();
renderDisposals();

</script>

</body>
</html>
